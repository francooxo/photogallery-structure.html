<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - Day 4</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo">
                <a href="#home">MyBrand</a>
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <section id="home">
            <h1>Welcome to Photo Gallery</h1>
            <p>Browse our beautiful collection of images below.</p>
        </section>

        <!-- Photo Gallery Section - Day 4 -->
        <section id="gallery" class="gallery-section">
            <h2>Photo Gallery</h2>
            <p>A collection of stunning images organized in a grid structure.</p>
            
            <div class="gallery-container">
                <!-- Image 1 -->
                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/300x300?text=Mountain+View" 
                         alt="Beautiful mountain landscape with snow-capped peaks">
                    <figcaption>Mountain View</figcaption>
                </figure>

                <!-- Image 2 -->
                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/300x300?text=Ocean+Sunset" 
                         alt="Golden sunset over a calm ocean with vibrant colors">
                    <figcaption>Ocean Sunset</figcaption>
                </figure>

                <!-- Image 3 -->
                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/300x300?text=Forest+Path" 
                         alt="Lush green forest path surrounded by tall trees">
                    <figcaption>Forest Path</figcaption>
                </figure>

                <!-- Image 4 -->
                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/300x300?text=City+Lights" 
                         alt="Sparkling city skyline at night with colorful lights">
                    <figcaption>City Lights</figcaption>
                </figure>

                <!-- Image 5 -->
                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/300x300?text=Desert+Sand" 
                         alt="Golden sand dunes under a clear blue sky">
                    <figcaption>Desert Sand</figcaption>
                </figure>

                <!-- Image 6 -->
                <figure class="gallery-item">
                    <img src="https://via.placeholder.com/300x300?text=Northern+Lights" 
                         alt="Aurora Borealis dancing across the night sky in vibrant green">
                    <figcaption>Northern Lights</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Photo Gallery. All rights reserved.</p>
    </footer>
</body>
</html>
